name: Build

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_ABI: arm64-v8a
  ANDROID_PLATFORM: android-26
  PACKAGE_NAME: VirtualMouse

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r28c
          add-to-path: true

      - name: Configure CMake
        run: |
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup_ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ env.ANDROID_ABI }} \
            -DANDROID_PLATFORM=${{ env.ANDROID_PLATFORM }} \
            -DCMAKE_BUILD_TYPE=Release \
            -B build \
            -S .

      - name: Build VirtualMouse
        run: cmake --build build --config Release -j"$(nproc)"

      - name: Prepare release package
        run: |
          set -e
          rm -rf dist
          mkdir -p dist/package

          cp build/*.so dist/package/

          if [ -d assets/data ]; then
            cp -a assets/data/. dist/package/
          fi

          cd dist/package
          zip -r "../${PACKAGE_NAME}.zip" .

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: VirtualMouse-package-${{ github.sha }}
          path: |
            dist/*.zip
          retention-days: 1